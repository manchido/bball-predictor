<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BballPredictor</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #080d14; font-family: 'Inter', system-ui, sans-serif; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-in { animation: slideUp 0.35s ease both; }

    .card-hover {
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .card-hover:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 44px rgba(0,0,0,0.55);
    }

    .pace-fill { transition: width 0.9s cubic-bezier(.23,1,.32,1); }
    .conf-fill { transition: width 0.7s cubic-bezier(.23,1,.32,1); }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Accordion games grid */
    .games-grid {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.35s cubic-bezier(.23,1,.32,1);
    }
    .games-grid.open {
      grid-template-rows: 1fr;
    }
    .games-grid-inner { overflow: hidden; }

    /* Chevron rotate */
    .chevron { transition: transform 0.3s ease; }
    .chevron.open { transform: rotate(180deg); }

    /* League row hover */
    .league-row {
      transition: background 0.15s ease;
      cursor: pointer;
    }
    .league-row:hover { background: rgba(255,255,255,0.04); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  </style>
</head>

<body class="text-gray-100 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useMemo } = React;

// ── Constants ────────────────────────────────────────────────────────────────

const ALL_LEAGUES = [
  'euroleague','eurocup','nba','acb','bbl',
  'bsl','lkl','koris','nbl_cz','aba','cba','hung',
];

const LEAGUE_META = {
  euroleague: { name: 'EuroLeague',  color: '#3B82F6' },
  eurocup:    { name: 'EuroCup',     color: '#8B5CF6' },
  nba:        { name: 'NBA',          color: '#EF4444' },
  acb:        { name: 'ACB',          color: '#F59E0B' },
  bbl:        { name: 'BBL',          color: '#9CA3AF' },
  bsl:        { name: 'BSL',          color: '#06B6D4' },
  lkl:        { name: 'LKL',          color: '#10B981' },
  koris:      { name: 'Korisliiga',   color: '#0EA5E9' },
  nbl_cz:     { name: 'NBL CZ',       color: '#A855F7' },
  aba:        { name: 'ABA League',   color: '#EC4899' },
  cba:        { name: 'CBA',          color: '#F97316' },
  hung:       { name: 'Hungary',      color: '#84CC16' },
};

// Scoring form grade — relative to the model's prediction for that team side
// pct = team_pts_l5 / model_side_pred
// > 1.06 → scoring above what model expects → "Hot"
// < 0.94 → scoring below                   → "Cold"
// otherwise                                 → "On Track"
function scoringFormGrade(ptsL5, modelPred) {
  if (!ptsL5 || !modelPred) return null;
  const ratio = ptsL5 / modelPred;
  if (ratio >= 1.06) return { label: 'Hot 🔥',      color: '#F97316', bg: '#431407' };
  if (ratio <= 0.94) return { label: 'Cold ❄️',      color: '#60A5FA', bg: '#172554' };
  return                     { label: 'On Track ✓',  color: '#34D399', bg: '#052e16' };
}

// Defensive form grade — relative to the model's prediction for the opponent side
// ptsAllowed vs opponent's model prediction: if you allow less than expected → Stingy
function defFormGrade(ptsAllowedL5, oppModelPred) {
  if (!ptsAllowedL5 || !oppModelPred) return null;
  const ratio = ptsAllowedL5 / oppModelPred;
  if (ratio <= 0.94) return { label: 'Stingy 🔒', color: '#34D399', bg: '#052e16' };
  if (ratio >= 1.06) return { label: 'Leaky 🚨',  color: '#F87171', bg: '#450a0a' };
  return                     { label: 'Average',   color: '#9CA3AF', bg: '#111827' };
}

// ── Pure helpers ─────────────────────────────────────────────────────────────

const leagueColor = (lg) => LEAGUE_META[lg]?.color ?? '#6B7280';
const leagueName  = (lg) => LEAGUE_META[lg]?.name  ?? lg.toUpperCase();

function confidenceColor(c) {
  if (c > 0.65) return '#34D399';
  if (c > 0.45) return '#FBBF24';
  return '#F87171';
}

function formatDate(d) {
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', {
    month: 'short', day: 'numeric',
  });
}

function awayTeam(match) { return match.split(' @ ')[0] ?? match; }
function homeTeam(match) { return match.split(' @ ')[1] ?? match; }

function todayStr() {
  return new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
  });
}

// Range bar context helpers
function barContext(game) {
  const half = (game.model_total_p90 - game.model_total_p10) / 2;
  const ctx  = Math.max(30, half * 1.4);
  return { lo: game.model_total_mean - ctx, hi: game.model_total_mean + ctx };
}

// ── Sub-components ───────────────────────────────────────────────────────────

// ScoringForm: replaces pace — shows L5 scoring avg + form grade relative to model prediction
function ScoringForm({ ptsL5, ptsAllowedL5, modelSidePred, oppModelPred, side }) {
  const isHome   = side === 'home';
  const offGrade = scoringFormGrade(ptsL5, modelSidePred);
  const defGrade = defFormGrade(ptsAllowedL5, oppModelPred);

  if (!ptsL5 && !ptsAllowedL5) {
    return <div className="mt-2 text-[9px] text-gray-700">no form data</div>;
  }

  return (
    <div className={`mt-2.5 space-y-1.5 ${isHome ? 'text-right' : ''}`}>

      {/* Offense row */}
      {ptsL5 && (
        <div className={`flex items-center gap-1.5 ${isHome ? 'justify-end' : ''}`}>
          <span className="text-[9px] text-gray-500">Scores</span>
          <span className="text-[11px] font-bold text-gray-200 tabular-nums">{ptsL5.toFixed(1)}</span>
          {offGrade && (
            <span
              className="text-[9px] font-bold px-1.5 py-0.5 rounded-md"
              style={{ color: offGrade.color, background: offGrade.bg }}
            >
              {offGrade.label}
            </span>
          )}
        </div>
      )}

      {/* Defense row */}
      {ptsAllowedL5 && (
        <div className={`flex items-center gap-1.5 ${isHome ? 'justify-end' : ''}`}>
          <span className="text-[9px] text-gray-500">Allows</span>
          <span className="text-[11px] font-bold text-gray-200 tabular-nums">{ptsAllowedL5.toFixed(1)}</span>
          {defGrade && (
            <span
              className="text-[9px] font-bold px-1.5 py-0.5 rounded-md"
              style={{ color: defGrade.color, background: defGrade.bg }}
            >
              {defGrade.label}
            </span>
          )}
        </div>
      )}

    </div>
  );
}

function GameCard({ game, league, index }) {
  const color  = leagueColor(league);
  const { lo, hi } = barContext(game);
  const rangeLeft  = Math.max(0, ((game.model_total_p10 - lo) / (hi - lo)) * 100);
  const rangeWidth = Math.min(100, ((game.model_total_p90 - game.model_total_p10) / (hi - lo)) * 100);
  const meanPct    = ((game.model_total_mean - lo) / (hi - lo)) * 100;
  const confColor  = confidenceColor(game.confidence);

  return (
    <div
      className="card-hover card-in rounded-2xl overflow-hidden"
      style={{
        background: 'linear-gradient(160deg, #0f1923 0%, #111b27 100%)',
        border: '1px solid #1e2d3d',
        borderTopColor: color + '66',
        animationDelay: `${index * 60}ms`,
      }}
    >
      {/* Top accent bar */}
      <div
        className="h-0.5 w-full"
        style={{ background: `linear-gradient(90deg, ${color}, transparent)` }}
      />

      {/* Header: league badge + date */}
      <div className="flex items-center justify-between px-4 pt-3 pb-2">
        <span
          className="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded-md"
          style={{ background: color + '22', color }}
        >
          {leagueName(league)}
        </span>
        <span className="text-[10px] text-gray-600">{formatDate(game.date)}</span>
      </div>

      {/* ── Score section ── */}
      <div className="px-4 pt-1 pb-3">
        <div className="flex items-start gap-2">

          {/* Away */}
          <div className="flex-1 min-w-0">
            <div className="text-[9px] font-bold text-gray-600 uppercase tracking-widest mb-1">Away</div>
            <div className="text-xs font-semibold text-gray-300 truncate leading-snug" title={awayTeam(game.match)}>
              {awayTeam(game.match)}
            </div>
            <div className="text-3xl font-black mt-1.5 tabular-nums leading-none" style={{ color }}>
              {game.model_away_mean.toFixed(1)}
            </div>
            <ScoringForm
              ptsL5={game.away_pts_l5}
              ptsAllowedL5={game.away_pts_allowed_l5}
              modelSidePred={game.model_away_mean}
              oppModelPred={game.model_home_mean}
              side="away"
            />
          </div>

          {/* VS divider */}
          <div className="flex flex-col items-center pt-5 gap-1.5 px-0.5">
            <div className="text-[10px] font-black text-gray-700">VS</div>
            <div className="w-px flex-1 bg-gray-800" style={{ minHeight: 40 }} />
          </div>

          {/* Home */}
          <div className="flex-1 min-w-0 text-right">
            <div className="text-[9px] font-bold text-gray-600 uppercase tracking-widest mb-1">Home</div>
            <div className="text-xs font-semibold text-gray-300 truncate leading-snug" title={homeTeam(game.match)}>
              {homeTeam(game.match)}
            </div>
            <div className="text-3xl font-black mt-1.5 tabular-nums leading-none" style={{ color }}>
              {game.model_home_mean.toFixed(1)}
            </div>
            <ScoringForm
              ptsL5={game.home_pts_l5}
              ptsAllowedL5={game.home_pts_allowed_l5}
              modelSidePred={game.model_home_mean}
              oppModelPred={game.model_away_mean}
              side="home"
            />
          </div>

        </div>
      </div>

      {/* ── Total + Range section ── */}
      <div className="mx-4 py-3 border-t border-gray-800/60">
        <div className="flex items-end justify-between">
          <div>
            <div className="text-[9px] font-bold text-gray-600 uppercase tracking-widest mb-0.5">
              Total Predicted
            </div>
            <div className="flex items-baseline gap-1.5">
              <span className="text-2xl font-black text-white tabular-nums">
                {game.model_total_mean.toFixed(1)}
              </span>
              <span className="text-xs text-gray-500">pts</span>
            </div>
          </div>
          <div className="text-right">
            <div className="text-[9px] font-bold text-gray-600 uppercase tracking-widest mb-0.5">
              80% Range
            </div>
            <div className="text-xs font-bold tabular-nums" style={{ color: color + 'cc' }}>
              {Math.round(game.model_total_p10)} &mdash; {Math.round(game.model_total_p90)}
            </div>
            <div className="text-[9px] text-gray-700 mt-0.5">
              ±{Math.round((game.model_total_p90 - game.model_total_p10) / 2)} pts
            </div>
          </div>
        </div>

        {/* Range bar */}
        <div className="mt-2 relative h-1 bg-gray-800 rounded-full overflow-hidden">
          <div
            className="absolute h-full rounded-full"
            style={{
              left: `${rangeLeft}%`,
              width: `${rangeWidth}%`,
              background: `linear-gradient(90deg, ${color}55, ${color})`,
            }}
          />
          {/* Mean marker */}
          <div
            className="absolute top-0 h-full w-0.5 bg-white rounded-full"
            style={{ left: `${meanPct}%` }}
          />
        </div>
      </div>

      {/* ── Confidence + Edge ── */}
      <div className="px-4 pb-4 space-y-2">

        {/* Confidence bar */}
        <div className="flex items-center gap-2">
          <span className="text-[9px] font-bold text-gray-600 uppercase tracking-wider w-16 shrink-0">
            Confidence
          </span>
          <div className="flex-1 h-1 bg-gray-800 rounded-full overflow-hidden">
            <div
              className="h-full rounded-full conf-fill"
              style={{
                width: `${(game.confidence * 100).toFixed(0)}%`,
                background: `linear-gradient(90deg, ${confColor}88, ${confColor})`,
              }}
            />
          </div>
          <span
            className="text-[10px] font-bold w-7 text-right tabular-nums"
            style={{ color: confColor }}
          >
            {(game.confidence * 100).toFixed(0)}%
          </span>
        </div>

        {/* Edge vs book line */}
        {game.edge !== null && game.book_total && (
          <div className="flex items-center gap-2">
            <span className="text-[9px] font-bold text-gray-600 uppercase tracking-wider w-16 shrink-0">
              vs Line
            </span>
            <span
              className="text-xs font-bold"
              style={{ color: game.edge > 0 ? '#34D399' : '#F87171' }}
            >
              {game.edge > 0 ? '↑' : '↓'} {game.edge > 0 ? '+' : ''}{game.edge.toFixed(1)} pts
            </span>
            <span className="text-[9px] text-gray-600">
              (line {game.book_total.toFixed(1)})
            </span>
          </div>
        )}

      </div>
    </div>
  );
}

function LeagueAccordion({ league, games, isOpen, onToggle }) {
  const color   = leagueColor(league);
  const avgTotal = (games.reduce((s, g) => s + g.model_total_mean, 0) / games.length).toFixed(1);
  const minTotal = Math.round(Math.min(...games.map(g => g.model_total_p10)));
  const maxTotal = Math.round(Math.max(...games.map(g => g.model_total_p90)));

  return (
    <div
      className="rounded-2xl overflow-hidden mb-3"
      style={{ border: '1px solid #1e2d3d' }}
    >
      {/* ── League header row (click to toggle) ── */}
      <div
        className="league-row flex items-center gap-4 px-5 py-4 rounded-2xl"
        style={{ borderLeft: `3px solid ${color}` }}
        onClick={onToggle}
        role="button"
        aria-expanded={isOpen}
      >
        {/* Dot + name */}
        <div className="flex items-center gap-2.5 min-w-0 flex-1">
          <div className="w-2.5 h-2.5 rounded-full shrink-0" style={{ background: color }} />
          <span className="font-black text-sm text-white tracking-wide">{leagueName(league)}</span>

          {/* Game count badge */}
          <span
            className="text-[10px] font-bold px-2 py-0.5 rounded-full shrink-0"
            style={{ background: color + '22', color }}
          >
            {games.length} game{games.length !== 1 ? 's' : ''}
          </span>
        </div>

        {/* Stats summary — hidden on small screens */}
        <div className="hidden sm:flex items-center gap-6 text-xs text-gray-500 shrink-0">
          <div className="text-center">
            <div className="text-[9px] font-bold uppercase tracking-wider text-gray-600 mb-0.5">Avg Total</div>
            <div className="font-bold text-gray-300 tabular-nums">{avgTotal}</div>
          </div>
          <div className="text-center">
            <div className="text-[9px] font-bold uppercase tracking-wider text-gray-600 mb-0.5">Range</div>
            <div className="font-bold tabular-nums" style={{ color: color + 'cc' }}>{minTotal}–{maxTotal}</div>
          </div>
        </div>

        {/* Chevron */}
        <svg
          className={`chevron shrink-0 ${isOpen ? 'open' : ''}`}
          width="16" height="16" viewBox="0 0 16 16" fill="none"
        >
          <path d="M4 6l4 4 4-4" stroke="#6B7280" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>

      {/* ── Collapsible games grid ── */}
      <div className={`games-grid ${isOpen ? 'open' : ''}`}>
        <div className="games-grid-inner">
          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 px-4 pb-5 pt-2">
            {games.map((game, idx) => (
              <GameCard key={game.game_id} game={game} league={league} index={idx} />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Manual Prediction Form ────────────────────────────────────────────────────

function ManualPredictForm() {
  const [league,  setLeague]  = useState('euroleague');
  const [home,    setHome]    = useState('');
  const [away,    setAway]    = useState('');
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState(null);
  const [result,  setResult]  = useState(null);

  const canSubmit = home.trim() && away.trim() && !loading;

  const submit = useCallback(async () => {
    if (!canSubmit) return;
    setLoading(true);
    setError(null);
    setResult(null);
    try {
      const res = await fetch('/predict/game', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ league, home_team: home.trim(), away_team: away.trim() }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail ?? `Server error ${res.status}`);
      setResult(data);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [league, home, away, canSubmit]);

  const inputCls = "w-full bg-[#0a1520] border border-[#1e2d3d] rounded-xl px-3 py-2.5 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-blue-600 transition-colors";

  return (
    <div
      className="rounded-2xl overflow-hidden mt-6"
      style={{ border: '1px solid #1e2d3d', background: 'linear-gradient(160deg, #0b1622 0%, #0f1e2e 100%)' }}
    >
      {/* Header */}
      <div className="px-5 py-4 border-b border-[#1e2d3d] flex items-center gap-2.5">
        <span className="text-base">🎯</span>
        <div>
          <p className="text-sm font-black text-white tracking-tight">Manual Prediction</p>
          <p className="text-[10px] text-gray-500 mt-0.5">Enter any matchup directly — bypasses schedule scraper</p>
        </div>
      </div>

      {/* Form */}
      <div className="px-5 py-5">
        <div className="grid grid-cols-1 sm:grid-cols-4 gap-3 items-end">

          {/* League */}
          <div>
            <label className="block text-[9px] font-bold text-gray-600 uppercase tracking-widest mb-1.5">League</label>
            <select
              value={league}
              onChange={e => setLeague(e.target.value)}
              className={inputCls + ' cursor-pointer'}
              style={{ appearance: 'none' }}
            >
              {ALL_LEAGUES.map(lg => (
                <option key={lg} value={lg}>{leagueName(lg)}</option>
              ))}
            </select>
          </div>

          {/* Away team */}
          <div>
            <label className="block text-[9px] font-bold text-gray-600 uppercase tracking-widest mb-1.5">Away Team</label>
            <input
              type="text"
              value={away}
              onChange={e => setAway(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && submit()}
              placeholder="e.g. Real Madrid"
              className={inputCls}
            />
          </div>

          {/* Home team */}
          <div>
            <label className="block text-[9px] font-bold text-gray-600 uppercase tracking-widest mb-1.5">Home Team</label>
            <input
              type="text"
              value={home}
              onChange={e => setHome(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && submit()}
              placeholder="e.g. FC Barcelona"
              className={inputCls}
            />
          </div>

          {/* Submit */}
          <div>
            <button
              onClick={submit}
              disabled={!canSubmit}
              className="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm text-white transition-all duration-150 disabled:opacity-40 disabled:cursor-not-allowed"
              style={{
                background: canSubmit
                  ? 'linear-gradient(135deg, #1d4ed8 0%, #6d28d9 100%)'
                  : '#1e2d3d',
                boxShadow: canSubmit ? '0 4px 16px rgba(37,99,235,0.3)' : 'none',
              }}
            >
              {loading ? <span className="spinner" /> : <span>🔮</span>}
              {loading ? 'Predicting…' : 'Predict'}
            </button>
          </div>
        </div>

        {/* Error */}
        {error && (
          <div className="mt-4 bg-red-950 border border-red-800 rounded-xl p-3 flex items-start gap-2">
            <span>⚠️</span>
            <div>
              <p className="font-semibold text-red-300 text-xs">Prediction failed</p>
              <p className="text-red-400 text-[11px] mt-0.5">{error}</p>
              <p className="text-gray-600 text-[10px] mt-1.5">
                Tip: team names must match what's in the gold table exactly.
                Run <code className="bg-gray-900 px-1 rounded">python cli.py list-teams --league {league}</code> to see valid names.
              </p>
            </div>
          </div>
        )}

        {/* Result card */}
        {result && (
          <div className="mt-5">
            <p className="text-[9px] font-bold text-gray-600 uppercase tracking-widest mb-3">Result</p>
            <div className="max-w-sm">
              <GameCard game={result} league={result.league} index={0} />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────

function App() {
  const [predictions,     setPredictions]     = useState([]);
  const [loading,         setLoading]         = useState(false);
  const [error,           setError]           = useState(null);
  const [warnings,        setWarnings]        = useState([]);
  const [lastFetched,     setLastFetched]     = useState(null);
  const [selectedLeagues, setSelectedLeagues] = useState([]);
  const [openLeagues,     setOpenLeagues]     = useState(new Set());

  const toggleLeague = useCallback((lg) => {
    setSelectedLeagues(prev =>
      prev.includes(lg) ? prev.filter(l => l !== lg) : [...prev, lg]
    );
  }, []);

  const groupedGames = useMemo(() => {
    const groups = {};
    for (const g of predictions) {
      if (!groups[g.league]) groups[g.league] = [];
      groups[g.league].push(g);
    }
    return groups;
  }, [predictions]);

  const leagueCount = Object.keys(groupedGames).length;

  const toggleLeagueOpen = useCallback((lg) => {
    setOpenLeagues(prev => {
      const next = new Set(prev);
      next.has(lg) ? next.delete(lg) : next.add(lg);
      return next;
    });
  }, []);

  const allExpanded = leagueCount > 0 && openLeagues.size === leagueCount;
  const toggleAll = useCallback(() => {
    setOpenLeagues(prev =>
      prev.size === leagueCount
        ? new Set()
        : new Set(Object.keys(groupedGames))
    );
  }, [leagueCount, groupedGames]);

  const fetchPredictions = useCallback(async () => {
    setLoading(true);
    setError(null);
    setWarnings([]);
    setPredictions([]);

    const controller = new AbortController();
    const timeout    = setTimeout(() => controller.abort(), 45_000); // 45s (leagues run in parallel)

    try {
      const params = selectedLeagues.length > 0
        ? '?' + selectedLeagues.map(l => 'leagues=' + encodeURIComponent(l)).join('&')
        : '';

      const res = await fetch('/predict/today' + params, { signal: controller.signal });
      clearTimeout(timeout);

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.detail ?? `Server error ${res.status}`);
      }
      const data = await res.json();
      const games = data.games ?? [];
      setPredictions(games);
      setWarnings(data.warnings ?? []);
      setLastFetched(new Date());
      // Auto-open leagues that have games, collapsed by default (user expands)
      setOpenLeagues(new Set());
    } catch (e) {
      clearTimeout(timeout);
      if (e.name === 'AbortError') {
        setError('Request timed out. Make sure the prediction server is running: uvicorn src.api.main:app --port 8080');
      } else {
        setError(e.message);
      }
    } finally {
      setLoading(false);
    }
  }, [selectedLeagues]);

  return (
    <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8">

      {/* ── Header ── */}
      <header className="flex items-center justify-between mb-8">
        <div className="flex items-center gap-3">
          <span className="text-4xl select-none">🏀</span>
          <div>
            <h1 className="text-xl font-black tracking-tight text-white">BballPredictor</h1>
            <p className="text-xs text-gray-500 mt-0.5">International Basketball · Totals Prediction</p>
          </div>
        </div>
        <div className="text-right">
          <p className="text-xs text-gray-500">Today</p>
          <p className="text-sm font-semibold text-gray-300">{todayStr()}</p>
        </div>
      </header>

      {/* ── League filter pills ── */}
      <div className="flex flex-wrap gap-2 mb-5">
        {ALL_LEAGUES.map(lg => {
          const active = selectedLeagues.includes(lg);
          const col    = leagueColor(lg);
          return (
            <button
              key={lg}
              onClick={() => toggleLeague(lg)}
              className="px-3 py-1 rounded-full text-xs font-semibold border transition-all duration-150"
              style={active
                ? { background: col + '33', color: col, borderColor: col }
                : { background: 'transparent', color: '#6B7280', borderColor: '#374151' }
              }
            >
              {leagueName(lg)}
            </button>
          );
        })}
        {selectedLeagues.length > 0 && (
          <button
            onClick={() => setSelectedLeagues([])}
            className="px-3 py-1 rounded-full text-xs font-medium border border-gray-700 text-gray-500 hover:text-gray-300 hover:border-gray-500 transition-all"
          >
            Clear
          </button>
        )}
      </div>

      {/* ── Predict button ── */}
      <div className="flex items-center gap-4 mb-10">
        <button
          onClick={fetchPredictions}
          disabled={loading}
          className="flex items-center gap-2.5 px-6 py-3 rounded-xl font-bold text-sm text-white transition-all duration-150 disabled:opacity-50 disabled:cursor-not-allowed"
          style={{
            background: 'linear-gradient(135deg, #2563EB 0%, #7C3AED 100%)',
            boxShadow: loading ? 'none' : '0 4px 20px rgba(37,99,235,0.4)',
          }}
        >
          {loading ? <span className="spinner" /> : <span>🔮</span>}
          {loading ? 'Fetching predictions…' : "Predict Today's Games"}
        </button>

        {lastFetched && !loading && (
          <p className="text-sm text-gray-400">
            <span className="text-white font-semibold">{predictions.length}</span> games ·{' '}
            <span className="text-white font-semibold">{leagueCount}</span> league{leagueCount !== 1 ? 's' : ''}
          </p>
        )}
      </div>

      {/* ── Error ── */}
      {error && (
        <div className="bg-red-950 border border-red-800 rounded-xl p-4 mb-8 flex items-start gap-3">
          <span className="text-xl">⚠️</span>
          <div>
            <p className="font-semibold text-red-300 text-sm">Prediction failed</p>
            <p className="text-red-400 text-xs mt-1">{error}</p>
          </div>
        </div>
      )}

      {/* ── Empty state ── */}
      {lastFetched && !loading && predictions.length === 0 && !error && (
        <div className="text-center py-20 text-gray-600">
          <p className="text-5xl mb-4">📅</p>
          <p className="text-lg font-semibold">No games scheduled today</p>
          <p className="text-sm mt-1">Check back tomorrow or try a different league filter.</p>
        </div>
      )}

      {/* ── Expand / Collapse All ── */}
      {leagueCount > 1 && (
        <div className="flex items-center justify-between mb-4">
          <p className="text-xs text-gray-600">
            {openLeagues.size} of {leagueCount} leagues expanded
          </p>
          <button
            onClick={toggleAll}
            className="text-xs font-semibold text-gray-400 hover:text-gray-200 transition-colors flex items-center gap-1.5"
          >
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              {allExpanded
                ? <path d="M2 8l4-4 4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                : <path d="M2 4l4 4 4-4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              }
            </svg>
            {allExpanded ? 'Collapse All' : 'Expand All'}
          </button>
        </div>
      )}

      {/* ── Accordion leagues ── */}
      {Object.entries(groupedGames).map(([league, games]) => (
        <LeagueAccordion
          key={league}
          league={league}
          games={games}
          isOpen={openLeagues.has(league)}
          onToggle={() => toggleLeagueOpen(league)}
        />
      ))}

      {/* ── Warnings ── */}
      {warnings.length > 0 && (
        <div className="mt-4 space-y-1.5">
          {warnings.map((w, i) => (
            <div
              key={i}
              className="text-[11px] text-yellow-600 bg-yellow-950/40 border border-yellow-900/60 rounded-lg px-3 py-2"
            >
              ⚠ {w}
            </div>
          ))}
        </div>
      )}

      {/* ── Manual prediction form ── */}
      <ManualPredictForm />

      {/* ── Footer ── */}
      <footer className="mt-16 pt-6 border-t border-gray-900 flex items-center justify-between text-[11px] text-gray-700">
        <span>BballPredictor · International Basketball Totals</span>
        <span>For research use only</span>
      </footer>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
